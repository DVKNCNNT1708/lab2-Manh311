openapi: 3.1.0
info:
  title: Smart Campus — Access Gate API
  version: 1.0.0
  description: Hợp đồng API cho dịch vụ quản lý cổng ra vào (Access Gate).
  contact:
    name: Access Gate Provider Team
    email: access-gate@smartcampus.local
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: access-logs
    description: Quản lý nhật ký ra vào
  - name: gate-management
    description: Quản lý thiết bị cổng

paths:
  /access/logs/recent:
    get:
      operationId: listRecentLogs
      summary: Lấy danh sách nhật ký quẹt thẻ gần đây
      description: Trả về danh sách các lượt quẹt thẻ ra/vào gần nhất. Core Business sử dụng API này để hiển thị dashboard hoặc audit.
      tags: [access-logs]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Danh sách nhật ký
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AccessLog' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /access/logs/{logId}:
    get:
      operationId: getLogById
      summary: Lấy chi tiết một nhật ký ra vào
      description: Truy xuất thông tin chi tiết của một lượt quẹt thẻ cụ thể dựa trên mã UUID. Dùng khi cần điều tra sự cố.
      tags: [access-logs]
      parameters:
        - name: logId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Chi tiết nhật ký
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccessLog' }
        '404': { $ref: '#/components/responses/NotFound' }

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Kiểm tra trạng thái hiện tại của cổng
      description: Lấy trạng thái vật lý hiện tại (bình thường hoặc đang bảo trì) của một cổng cụ thể.
      tags: [gate-management]
      parameters:
        - name: gateId
          in: path
          required: true
          schema: { type: string, pattern: '^GATE-[0-9]{2}$' }
      responses:
        '200':
          description: Trạng thái cổng
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GateStatus' }

  /cards/{cardId}:
    get:
      operationId: getCardInfo
      summary: Lấy thông tin chủ thẻ
      description: Trả về thông tin định danh và trạng thái (active, blocked, expired) của một thẻ RFID cụ thể.
      tags: [gate-management]
      parameters:
        - name: cardId
          in: path
          required: true
          schema: { type: string, pattern: '^RFID-[0-9]{4}-[0-9]{3}$' }
      responses:
        '200':
          description: Thông tin thẻ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CardInfo' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AccessLog:
      type: object
      required: [id, cardId, gateId, direction, status, timestamp]
      properties:
        id: { type: string, format: uuid }
        cardId: { type: string }
        gateId: { type: string }
        direction: { type: string, enum: [IN, OUT] }
        status: { type: string, enum: [SUCCESS, DENIED] }
        timestamp: { type: string, format: date-time }
        operatorNote:
          type: [string, "null"]
          description: "Ghi chú thủ công, có thể null"

    GateStatus:
      type: object
      required: [gateId, status, lastUpdated]
      properties:
        gateId: { type: string }
        status:
          oneOf:
            - $ref: '#/components/schemas/NormalStatus'
            - $ref: '#/components/schemas/MaintenanceStatus'
          discriminator:
            propertyName: statusType
            mapping:
              NORMAL: '#/components/schemas/NormalStatus'
              MAINTENANCE: '#/components/schemas/MaintenanceStatus'
        lastUpdated: { type: string, format: date-time }

    NormalStatus:
      type: object
      required: [statusType, value]
      properties:
        statusType: { type: string, const: NORMAL }
        value: { type: string, enum: [OPEN, CLOSED] }

    MaintenanceStatus:
      type: object
      required: [statusType, reason]
      properties:
        statusType: { type: string, const: MAINTENANCE }
        reason: { type: string }

    CardInfo:
      type: object
      required: [cardId, holderName, status]
      properties:
        cardId: { type: string }
        holderName: { type: string }
        status: { type: string, enum: [ACTIVE, BLOCKED, EXPIRED] }

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: [string, "null"] }

  responses:
    Unauthorized:
      description: Chưa xác thực
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }